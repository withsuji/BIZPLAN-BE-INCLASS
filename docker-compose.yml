version: '3.8'

services:
  # MySQL 8.0 (Aurora MySQL Compatible)
  mysql:
    image: mysql:8.0
    container_name: bizplan-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bizplan
      MYSQL_USER: bizplan
      MYSQL_PASSWORD: bizplanpassword
      TZ: UTC
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone='+00:00'
      --max_connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - bizplan-network

  # Redis 7 (Cache)
  redis:
    image: redis:7-alpine
    container_name: bizplan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bizplan-network

  # MailHog (Email Testing)
  mailhog:
    image: mailhog/mailhog
    container_name: bizplan-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - bizplan-network

  # Adminer (Database Admin UI)
  adminer:
    image: adminer:latest
    container_name: bizplan-adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: nette
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - bizplan-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  bizplan-network:
    driver: bridge

