# Local Development Profile (Docker Compose)
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bizplan?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: bizplan
    password: bizplanpassword
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: BizplanHikariPool
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  flyway:
    enabled: true
    clean-disabled: false

# Local Logging
logging:
  level:
    vibe.bizplan: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

